services:
  backend:
    container_name: inizio-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    image: php:8.3-cli
    container_name: inizio-frontend
    working_dir: /app
    command: sh -c "php -S 0.0.0.0:8000 -t /app && echo 'Open http://localhost:8000'"
    ports:
      - "8000:8000"
    environment:
      BACKEND_PRIVATE_URL: http://backend:3000
      BACKEND_PUBLIC_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  node_modules_cache:
